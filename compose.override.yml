# Dev ergonomics only. Auto-applied by `docker compose` (no -f).
# Production runs `docker compose -f compose.yml ...` which EXCLUDES this file.
# Optional-service topology lives in compose.yml under `profiles:`; this file
# only relaxes restart policy and adds source bind-mounts / live reload.
services:
  db:
    restart: "no"

  backend:
    restart: "no"
    ports:
      - "127.0.0.1:${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend/:/app
      - ./backend/openapi.json:/app/openapi.json
      # local_fs storage bind (when STORAGE_PROVIDER_TYPE=local_fs)
      - ${LOCAL_STORAGE_HOST_PATH:-./.store/local_fs}:${LOCAL_STORAGE_BASE_PATH:-/data/storage}
    environment:
      - PORT=${BACKEND_PORT}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["bash", "/app/start-reload.sh"]
    build:
      context: ./backend
      args:
        INSTALL_DEV: ${INSTALL_DEV-false}
    networks:
      - default

  celery_worker:
    restart: "no"
    volumes:
      - ./backend/:/app
      - ${LOCAL_STORAGE_HOST_PATH:-./.store/local_fs}:${LOCAL_STORAGE_BASE_PATH:-/data/storage}

  celery_beat:
    restart: "no"
    volumes:
      - ./backend/:/app

  frontend:
    restart: "no"
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    depends_on:
      - backend
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:${BACKEND_PORT}
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - ./backend/openapi.json:/app/openapi.json
      - frontend_node_modules:/app/node_modules
    networks:
      - default

  # Thin dev overrides for optional services — only materialize when their
  # profile is active (selected in COMPOSE_PROFILES). Base defs are in compose.yml.
  minio:
    restart: "no"
  searxng:
    restart: "no"
  ollama:
    restart: "no"

volumes:
  frontend_node_modules: # convenience for development

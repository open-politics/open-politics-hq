services:
  # ── Core services (always run; no profile) ──────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: always
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
      - PGPORT=${POSTGRES_PORT}

  backend:
    image: '${DOCKER_IMAGE_BACKEND:-backend}:${TAG-latest}'
    restart: always
    networks:
      - default
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    # `$$` defers expansion to the container shell (reads .env-loaded values),
    # so BACKEND_BIND_HOST can be flipped to 127.0.0.1 by the hardened-network
    # override fragment without changing this file. Default 0.0.0.0 is correct
    # for bridge mode (docker's network isolation does the work).
    command: ["sh", "-c", "bash /app/prestart.sh && exec uvicorn app.main:app --workers $${BACKEND_WORKERS:-4} --host $${BACKEND_BIND_HOST:-0.0.0.0} --port $${BACKEND_PORT}"]
    build:
      context: ./backend
      args:
        INSTALL_DEV: ${INSTALL_DEV-false}
    # Source is baked into the image (see backend/Dockerfile COPY ./app /app/app).
    # The dev source bind lives in compose.override.yml — prod runs the image as-is.

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
      - ./.config/redis.conf:/usr/local/etc/redis/redis.conf
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port ${REDIS_PORT:-6379}
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --rename-command REPLICAOF ""
      --rename-command SLAVEOF ""
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Container always binds 3000 internally; FRONTEND_PORT is the host-side
    # mapping, configurable so setup.sh can bump it when 3000 is in use.
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    networks:
      - default

  celery_worker:
    image: '${DOCKER_IMAGE_BACKEND:-backend}:${TAG-latest}'
    build:
      context: ./backend
      args:
        INSTALL_DEV: ${INSTALL_DEV-false}
    restart: always
    networks:
      - default
    depends_on:
      - db
      - redis
      - backend
    env_file:
      - .env
    command: ["celery", "-A", "app.core.celery_app.celery", "worker", "--loglevel=info", "-P", "prefork", "--concurrency=${CELERY_CONCURRENCY:-4}"]
    # Source bind is dev-only (compose.override.yml).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_beat:
    image: '${DOCKER_IMAGE_BACKEND:-backend}:${TAG-latest}'
    build:
      context: ./backend
      args:
        INSTALL_DEV: ${INSTALL_DEV-false}
    restart: always
    networks:
      - default
    depends_on:
      - db
      - redis
      - backend
    env_file:
      - .env
    command: >
      celery -A app.core.celery_app.celery beat
      --loglevel=info
      --pidfile=/tmp/celerybeat.pid
      --schedule=/tmp/celerybeat-schedule
    # Source bind is dev-only (compose.override.yml).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Optional services (opt-in via COMPOSE_PROFILES; see setup.sh) ────────────
  minio:
    image: minio/minio:latest
    profiles: ["minio"]
    restart: always
    env_file:
      - .env
    command: ["minio", "server", "/data", "--console-address", ":9001"]
    volumes:
      - ./.store/minio:/data
    networks:
      - default

  searxng:
    image: searxng/searxng:latest
    profiles: ["searxng"]
    restart: always
    volumes:
      - ./.config/searxng:/etc/searxng:ro
      - searxng_data:/var/cache/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    networks:
      - default

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    container_name: ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
    restart: unless-stopped
    networks:
      - default

  nominatim:
    image: mediagis/nominatim:5.1
    profiles: ["nominatim"]
    restart: always
    shm_size: 4g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2h
    environment:
      # Default: world coarse (admin boundaries: countries, states, cities).
      # Override NOMINATIM_PBF_URL / NOMINATIM_IMPORT_STYLE in .env for detail.
      - PBF_URL=${NOMINATIM_PBF_URL:-https://planet.openstreetmap.org/pbf/planet-latest.osm.pbf}
      - REPLICATION_URL=${NOMINATIM_REPLICATION_URL:-https://planet.openstreetmap.org/replication/day/}
      - IMPORT_STYLE=${NOMINATIM_IMPORT_STYLE:-admin}
      - UPDATE_MODE=none
      - FREEZE=false
      - THREADS=4
      - GUNICORN_WORKERS=4
      - IMPORT_WIKIPEDIA=false
      - IMPORT_GB_POSTCODES=true
      - POSTGRES_SHARED_BUFFERS=2GB
      - POSTGRES_MAINTENANCE_WORK_MEM=4GB
      - POSTGRES_WORK_MEM=50MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=8GB
    volumes:
      - nominatim-data:/var/lib/postgresql/16/main
      - nominatim-flatnode:/nominatim/flatnode
    networks:
      - default
    env_file:
      - .env
    # Admin: ~5GB download, ~2h import | Address (Europe): ~28GB, ~3h | Full: ~60GB, ~8h

  caddy:
    image: caddy:2-alpine
    profiles: ["caddy"]
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./.config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN must be set for Caddy}
      - BACKEND_PORT=${BACKEND_PORT:-8022}
      - ACME_EMAIL=${ACME_EMAIL:-}
    depends_on:
      - backend
      - frontend
    networks:
      - default

volumes:
  app-db-data:
  redis_data:
  searxng_data:
  ollama_data:
    name: ollama_data
  nominatim-data:
  nominatim-flatnode:
  caddy_data:
  caddy_config:

networks:
  default:
    external: false

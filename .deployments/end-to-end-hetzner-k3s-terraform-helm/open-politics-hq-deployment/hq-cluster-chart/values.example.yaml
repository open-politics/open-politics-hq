replicaCount: 1

email: ""

# Namespace for the deployment
namespace: ""

image:
  backend:
    repository: openpoliticsproject/backend
    tag: "latest"
    pullPolicy: Always
    nodes: 1
  frontend:
    repository: openpoliticsproject/frontend
    tag: "latest"
    pullPolicy: Always
  celery-worker:
    repository: openpoliticsproject/backend
    tag: "latest"
    pullPolicy: Always
  postgres:
    image: pgvector/pgvector
    tag: "pg16"
    pullPolicy: IfNotPresent
    nodes: 1
  redis:
    image: redis
    tag: "alpine"
    pullPolicy: IfNotPresent
  minio:
    image: minio/minio
    tag: "latest"
    pullPolicy: IfNotPresent
    nodes: 0
  nominatim:
    nodes: 0
    image: mediagis/nominatim
    tag: "5.1"
    pullPolicy: IfNotPresent

# Image pull secrets (if using private registry)
# imagePullSecrets:
#   - name: regcred

service:
  type: ClusterIP
  port: 80


ingress:
  enabled: true
  className: traefik
  annotations:
    # Traefik built-in ACME SSL (no cert-manager needed!)
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
    # Explicit domain specification for Traefik v3+
    traefik.ingress.kubernetes.io/router.tls.domains.0.main: ""
    traefik.ingress.kubernetes.io/router.tls.domains.0.sans: "www."
    # Traefik handles HTTP->HTTPS redirect via boot.sh HelmChartConfig
    # Session affinity
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: "open-politics-session"
  host: ""
  path: /
  tls:
    # Let Traefik ACME manage TLS; leave secretName unset
    secretName: ""

postgres:
  postgresqlDatabase: opp_app_users
  postgresqlUser: postgres
  postgresqlPassword: ""
  service:
    port: 5432
  persistence:
    enabled: true
    storageClass: "hcloud-volumes"
    size: 20Gi
    accessMode: ReadWriteOnce

redis:
  service:
    port: 6379
  persistence:
    enabled: true
    storageClass: "local-path"
    size: 8Gi
    accessMode: ReadWriteOnce

# Application file storage (for STORAGE_PROVIDER_TYPE=local_fs)
# Shared between backend and celery-worker pods
storage:
  persistence:
    enabled: false
    storageClass: "hcloud-volumes"
    size: 50Gi
    accessMode: ReadWriteOnce

configmaps:
  stack:
    name: stack-config
  redis:
    name: redis-config

env:
  config:
    # --- Core ---
    DOMAIN: "open-politics.org"
    ENVIRONMENT: "production"
    PROJECT_NAME: "HQ"
    ORGANISATION_NAME: "Open Politics Project"
    STACK_NAME: "open-politics-prod-stack"
    FRONTEND_PORT: "3000"
    BACKEND_PORT: "8022"
    BACKEND_CORS_ORIGINS: "http://localhost,http://localhost:5173,https://localhost,https://localhost:3000,http://open-politics.org,https://open-politics.org,https://open-politics.org:80,https://open-politics.org:443"

    # --- Deployment capabilities ---
    # Comma-separated: organize, ingest, compute, delete, setup. "*" = all, "" = readonly.
    DEPLOYMENT_CAPABILITIES: "*"

    # --- Storage ---
    # "minio" | "s3" | "local_fs"
    STORAGE_PROVIDER_TYPE: "minio"
    LOCAL_STORAGE_BASE_PATH: "/data/storage"
    ALLOWED_IMPORT_PATHS: "/data/import,/data/storage/datasets"
    STORAGE_BROWSE_MAX_COUNT_FILES: "5000"
    MINIO_ENDPOINT: ""
    MINIO_HOST: "minio"
    MINIO_PORT: "9000"
    MINIO_SECURE: "true"

    # --- Redis ---
    REDIS_PORT: "6379"

    # --- Content processing ---
    PROCESS_CONTENT_RATE_LIMIT: "50/s"
    PDF_MAX_PAGES: "0"
    # Enrichers: comma-separated names, "*" for all, "" = none.
    # Values: hash, ocr, geocoding, language_detection, quality_score, embedding
    ENABLED_ENRICHERS: ""

    # --- Annotation processing ---
    DEFAULT_ANNOTATION_CONCURRENCY: "5"
    MAX_ANNOTATION_CONCURRENCY: "20"
    ENABLE_PARALLEL_ANNOTATION_PROCESSING: "true"

    # --- Geocoding ---
    NOMINATIM_BASE_URL: "http://nominatim:8080"
    GEOCODING_USER_AGENT: "OpenPoliticsHQ/1.0"

    # --- Provider types ---
    OCR_PROVIDER_TYPE: "tesseract"
    WEB_SEARCH_PROVIDER_TYPE: "tavily"
    SCRAPING_PROVIDER_TYPE: "newspaper4k"
    OLLAMA_BASE_URL: "http://ollama:11434"
    OLLAMA_DEFAULT_MODEL: "llama3"

  secrets:
    SECRET_KEY: ""
    ENCRYPTION_MASTER_KEY: ""
    FIRST_SUPERUSER: ""
    FIRST_SUPERUSER_PASSWORD: ""
    USERS_OPEN_REGISTRATION: "false"

    # --- Postgres ---
    POSTGRES_SERVER: "postgres"
    POSTGRES_DB: "opp_app_users_prod"
    POSTGRES_USER: "postgres"
    POSTGRES_PORT: "5432"
    POSTGRES_PASSWORD: ""
    POSTGRES_SSL_MODE: ""

    # --- Redis ---
    REDIS_HOST: "redis"
    REDIS_PORT: "6379"
    REDIS_DB: "0"
    REDIS_PASSWORD: ""

    # --- Discourse SSO ---
    DISCOURSE_CONNECT_ENABLED: "false"
    DISCOURSE_CONNECT_SECRET: ""
    DISCOURSE_CONNECT_URL: ""

    # --- MinIO / S3 ---
    MINIO_ROOT_USER: ""
    MINIO_ROOT_PASSWORD: ""
    MINIO_BUCKET_NAME: "hq-user-storage-prod"
    MINIO_REGION: "eu-central"
    MINIO_ACCESS_KEY: ""
    MINIO_SECRET_KEY: ""
    MINIO_USE_SSL: "true"

    # --- SMTP ---
    SMTP_HOST: ""
    SMTP_PORT: "587"
    SMTP_TLS: "true"
    SMTP_SSL: "false"
    SMTP_USER: ""
    SMTP_PASSWORD: ""
    EMAILS_FROM_EMAIL: ""
    EMAILS_FROM_NAME: "HQ"
    REQUIRE_EMAIL_VERIFICATION: "false"

    # --- Mapbox ---
    MAPBOX_ACCESS_TOKEN: ""

    # --- AI provider keys ---
    OPENAI_API_KEY: ""
    GOOGLE_API_KEY: ""
    ANTHROPIC_API_KEY: ""
    MISTRAL_API_KEY: ""
    TAVILY_API_KEY: ""
    JINA_API_KEY: ""
    VOYAGE_API_KEY: ""

    # --- Observability ---
    SENTRY_DSN: ""

    # --- Misc ---
    WIPE_DB: "False"

# Traefik Configuration (k3s native)
# Using Traefik with built-in ACME for maximum efficiency - no cert-manager needed!

# MinIO Configuration (optional — for STORAGE_PROVIDER_TYPE=minio)
minio:
  service:
    type: ClusterIP
    port: 9000
    nodePort: null
  consoleService:
    type: ClusterIP
    port: 9001
    nodePort: null
  persistence:
    enabled: true
    storageClass: "local-path"
    size: 50Gi
    accessMode: ReadWriteOnce
  command:
    - /bin/bash
    - -c
  args:
    - minio server /data --console-address :9001

# Resource limits and requests
resources:
  backend:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  frontend:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  celery:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  celeryBeat:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
  postgres:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  redis:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi

# Nominatim geocoding (optional — disabled by default, heavy import)
nominatim:
  service:
    type: ClusterIP
    port: 8721
  # For Europe detailed (10 min import, address-level)
  pbfUrl: "https://download.geofabrik.de/europe-latest.osm.pbf"
  replicationUrl: "https://download.geofabrik.de/europe-updates/"
  importStyle: "admin"
  # For world coarse (2h import, city/district-level) - DEFAULT alternative:
  # pbfUrl: "https://planet.openstreetmap.org/pbf/planet-latest.osm.pbf"
  # replicationUrl: "https://planet.openstreetmap.org/replication/day/"
  # importStyle: "admin"
  persistence:
    enabled: true
    storageClass: "hcloud-volumes"
    dataSize: 100Gi
    workSize: 80Gi
    accessMode: ReadWriteOnce

# Node affinity (optional - spread across nodes)
nodeAffinity:
  enabled: true

# Pod disruption budgets
podDisruptionBudget:
  enabled: true
  minAvailable: 1
